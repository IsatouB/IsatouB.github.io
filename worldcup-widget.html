  .hd-text p{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;font-weight:500}
  .hd-actions{display:flex;align-items:center;gap:8px;margin-top:12px;position:relative;z-index:1}

  .notif-btn{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);transition:background .15s}

  .notif-btn.on{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}

  /* Tabs */
  .tabs{display:flex;background:#1a2636;border-bottom:1px solid rgba(255,255,255,.06);padding:0 4px}
  .tab{flex:1;padding:13px 4px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:rgba(255,255,255,.4);border:none;background:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;letter-spacing:.2px}
  .tab:hover{color:rgba(255,255,255,.7)}
  .tab.active{color:#e8380d;border-bottom-color:#e8380d}

  /* Group pills */
  .group-pills{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:10px 14px;background:#1a2636;border-bottom:1px solid rgba(255,255,255,.05);scrollbar-width:none}

  .gpill{flex-shrink:0;padding:5px 13px;font-size:11px;font-weight:700;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);background:transparent;transition:all .15s;white-space:nowrap}
  .gpill:hover{color:#fff;border-color:rgba(255,255,255,.35)}
  .gpill.active{background:#e8380d;color:#fff;border-color:#e8380d}

  .mlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  .day-label{padding:9px 16px 6px;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;position:sticky;top:0;background:#151f2e;z-index:2}

// в”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const ET = 'America/New_York';

function etTime(d){
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:ET});
}
function etDay(d){
  return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',timeZone:ET});
}
function etDateStr(d){
  return d.toLocaleDateString('en-US',{timeZone:ET});
}
function isLive(d){
  const n=Date.now(),s=d.getTime();
  return n>=s && n<=s+7200000;
}
function isTodayET(d){
  return etDateStr(d)===etDateStr(new Date());
}

// в”Ђв”Ђ Live scores state в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let scores={};   // keyed by match id: {home, away, status, minute}

// в”Ђв”Ђ Stage chip class в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const chipMap={R32:'chip-r32',R16:'chip-r16',QF:'chip-qf',SF:'chip-sf',FIN:'chip-fin','3P':'chip-3p'};
function chipClass(g){return chipMap[g]||''}
function stageLabel(m){return m.stage||`Group ${m.g} В· MD${m.md}`}

// в”Ђв”Ђ Group standings (computed from match scores) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let groupStandings={};

function computeGroupStandings(){
  const grpList=['A','B','C','D','E','F','G','H','I','J','K','L'];
  grpList.forEach(grp=>{
    const teams={};
    const gms=M.filter(m=>m.g===grp);
    gms.forEach(m=>{
      if(!teams[m.h]) teams[m.h]={name:m.h,flag:m.hf,pts:0,gd:0,gf:0,played:0};
      if(!teams[m.a]) teams[m.a]={name:m.a,flag:m.af,pts:0,gd:0,gf:0,played:0};
    });
    gms.forEach(m=>{
      const sc=scores[m.id];
      if(!sc||sc.home==null||sc.away==null) return;
      const hg=sc.home,ag=sc.away;
      teams[m.h].gf+=hg; teams[m.h].gd+=hg-ag; teams[m.h].played++;
      teams[m.a].gf+=ag; teams[m.a].gd+=ag-hg; teams[m.a].played++;
      if(hg>ag) teams[m.h].pts+=3;
      else if(ag>hg) teams[m.a].pts+=3;
      else { teams[m.h].pts++; teams[m.a].pts++; }
    });
    const sorted=Object.values(teams).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    if(sorted.length>=2&&sorted[0].played>0){
      groupStandings[grp]={win:sorted[0].name,winF:sorted[0].flag,ru:sorted[1].name,ruF:sorted[1].flag};
    }
  });
}

function resolveTeam(name,flag){
  const wm=name.match(/^Win ([A-L])$/);
  if(wm){ const s=groupStandings[wm[1]]; if(s) return {n:s.win,f:s.winF}; }
  const rm=name.match(/^R\/u ([A-L])$/);
  if(rm){ const s=groupStandings[rm[1]]; if(s) return {n:s.ru,f:s.ruF}; }
  return {n:name,f:flag};
}

// в”Ђв”Ђ Match card в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function isPast(d){ return Date.now() > d.getTime()+7200000; }

function card(m){
  const d=new Date(m.dt);
  const live=isLive(d);
  const past=isPast(d);
  const today=isTodayET(d);
  let cls='mcard'+(live?' is-live':past?' is-past':today?' is-today':'');
  const sc=scores[m.id];

  let timeHtml;
  if(live){
    const minTxt=sc?.minute ? `<div class="mc-min">${sc.minute}'</div>` : '';
    timeHtml=`<span class="live-pill">LIVE</span>${minTxt}`;
  } else if(past){
    timeHtml=`<span class="ft-pill">FT</span><div class="mc-tz">${etTime(d)}</div>`;
  } else {
    timeHtml=`<div class="mc-t">${etTime(d)}</div><div class="mc-tz">ET</div>`;
  }

  // Score display вЂ” only show for live or finished matches, never for upcoming
  const scoreClass = past ? 'mc-score-fin' : 'mc-score-val';
  const hScore = (live||past) && sc && sc.home!=null ? `<span class="${scoreClass}">${sc.home}</span>` : (live ? `<span class="mc-score-dash">-</span>` : '');
  const aScore = (live||past) && sc && sc.away!=null ? `<span class="${scoreClass}">${sc.away}</span>` : (live ? `<span class="mc-score-dash">-</span>` : '');

  const ht=resolveTeam(m.h,m.hf), at=resolveTeam(m.a,m.af);
  const cc=chipClass(m.g);
  return `<div class="${cls}">
    <div class="mc-time">${timeHtml}</div>
    <div class="mc-teams">
      <div class="mc-row"><span class="mc-flag">${ht.f}</span><span class="mc-name">${ht.n}</span>${hScore}</div>
      <div class="mc-vsrow"><div class="mc-vsline"></div><span class="mc-vstxt">VS</span><div class="mc-vsline"></div></div>
      <div class="mc-row"><span class="mc-flag">${at.f}</span><span class="mc-name">${at.n}</span>${aScore}</div>
    </div>
    <div class="mc-right">
      <span class="mc-stage-chip ${cc}">${stageLabel(m)}</span>
      <span class="mc-city">${m.city}</span>
    </div>
  </div>`;
}

function groupByDay(arr){
  const map=new Map();
  arr.forEach(m=>{
    const d=new Date(m.dt);
    const key=etDateStr(d);
    if(!map.has(key)) map.set(key,{key,label:etDay(d),items:[]});
    map.get(key).items.push(m);
  });
  return Array.from(map.values());
}
function renderDays(arr){
  if(!arr.length) return '<div class="empty">No matches found</div>';
  return groupByDay(arr).map(g=>`<div class="day-label">${g.label}</div>`+g.items.map(card).join('')).join('');
}

// в”Ђв”Ђ Tabs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let tab='today', grp='A';

function showTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['results','today','upcoming','group','knockout'][i]===t);
  });
  render();
}
function setGroup(g){grp=g;render();}

function render(){
  const list=document.getElementById('mlist');
  const pills=document.getElementById('gpills');
  const now=new Date();
  const gs=['A','B','C','D','E','F','G','H','I','J','K','L'];

  if(tab==='today'){
    pills.style.display='none';
    const today=M.filter(m=>isTodayET(new Date(m.dt)));
    if(today.length) list.innerHTML=today.map(card).join('');
    else{
      const next=M.filter(m=>new Date(m.dt)>now).slice(0,8);
      list.innerHTML='<div class="day-label">No matches today вЂ” coming up next</div>'+next.map(card).join('');
    }
  } else if(tab==='results'){
    pills.style.display='none';
    const done=M.filter(m=>isPast(new Date(m.dt)))
                 .sort((a,b)=>new Date(b.dt)-new Date(a.dt));
    list.innerHTML=done.length
      ? renderDays(done)
      : '<div class="empty">No results yet вЂ” check back after kick-off</div>';
  } else if(tab==='upcoming'){
    pills.style.display='none';
    const up=M.filter(m=>new Date(m.dt)>=now)
               .sort((a,b)=>new Date(a.dt)-new Date(b.dt));
    list.innerHTML=renderDays(up);
  } else if(tab==='group'){
    pills.style.display='flex';
    pills.innerHTML=gs.map(g2=>`<button class="gpill${g2===grp?' active':''}" onclick="setGroup('${g2}')">Group ${g2}</button>`).join('');
    list.innerHTML=renderDays(M.filter(m=>m.g===grp));
  } else if(tab==='knockout'){
    pills.style.display='none';
    const stages=[['R32','Round of 32'],['R16','Round of 16'],['QF','Quarterfinals'],['SF','Semifinals'],['3P','3rd Place'],['FIN','Final']];
    list.innerHTML=stages.map(([k,l])=>{const ms=M.filter(m=>m.g===k);return ms.length?`<div class="day-label">${l}</div>`+ms.map(card).join(''):''}).join('');
  }
}

// в”Ђв”Ђ Reminder notifications (fires 15 min before kick-off) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function updateCountdown(){
  if(!notifSupported||Notification.permission!=='granted') return;
  const now=Date.now();
  const sorted=M.slice().sort((a,b)=>new Date(a.dt)-new Date(b.dt));
  const next=sorted.find(m=>new Date(m.dt).getTime()>now);
  if(!next) return;
  const diff=new Date(next.dt).getTime()-now;
  if(diff>0&&diff<=900000&&!next._notifSent){
    next._notifSent=true;
    new Notification('вљЅ Kick-off in 15 mins!',{
      body:`${next.h} vs ${next.a} В· ${next.venue}`,tag:`wc-${next.id}`
    });
  }
}

// в”Ђв”Ђ Notifications в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const notifSupported = typeof Notification !== 'undefined';

function updateNotifBtn(){
  const btn=document.getElementById('notif-btn');
  if(!notifSupported){btn.textContent='рџ”” Reminders';btn.style.opacity='.5';return;}
  const p=Notification.permission;
  if(p==='granted'){btn.textContent='рџ”” On';btn.classList.add('on');}
  else if(p==='denied'){btn.textContent='рџ”• Blocked';btn.classList.remove('on');}
  else{btn.textContent='рџ”” Reminders';btn.classList.remove('on');}
}

async function toggleNotifs(){
  if(!notifSupported){
    alert('Add this page to your Home Screen first, then tap Reminders to enable match notifications.');
    return;
  }
  if(Notification.permission==='granted'){
    alert('Reminders are on! You\'ll get a notification 15 mins before each match.');
    return;
  }
  if(Notification.permission==='denied'){
    alert('Notifications are blocked. Go to Settings в†’ Safari в†’ Notifications to allow them for this site.');
    return;
  }
  const result=await Notification.requestPermission();
  updateNotifBtn();
  if(result==='granted'){
    new Notification('вњ… Reminders enabled!',{body:'You\'ll be notified 15 mins before each World Cup match.',tag:'wc-setup'});
  }
}

// в”Ђв”Ђ Live scores (ESPN public API вЂ” no key needed) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// ESPN uses different names for some teams вЂ” normalise before comparing
const ESPN_ALIAS={
  'united states':'usa',
  'bosnia and herzegovina':'bosnia & herz.',
  'cГґte d\'ivoire':'ivory coast',"cote d'ivoire":'ivory coast',
  'korea republic':'south korea','republic of korea':'south korea',
  'democratic republic of congo':'dr congo','congo dr':'dr congo',
  'cape verde islands':'cape verde',
  'new zealand':'new zealand','aotearoa new zealand':'new zealand',
  'curaГ§ao':'curacao','curacao':'curacao',
  'tГјrkiye':'turkey',
};
function espnKey(n){
  // Strip common accents so Г§в†’c, Гјв†’u, etc. as a fallback
  const l=n.toLowerCase().trim().normalize('NFD').replace(/[МЂ-НЇ]/g,'');
  const mapped=n.toLowerCase().trim();
  return ESPN_ALIAS[mapped]||ESPN_ALIAS[l]||mapped;
}

function parseESPNEvents(events){
  let updated=false;
  events.forEach(ev=>{
    const comp=ev.competitions?.[0];
    if(!comp) return;
    const home=comp.competitors?.find(c=>c.homeAway==='home');
    const away=comp.competitors?.find(c=>c.homeAway==='away');
    if(!home||!away) return;
    const homeName=home.team?.displayName||'';
    const awayName=away.team?.displayName||'';
    const evDate=ev.date?.split('T')[0];
    const nm=(n1,n2)=>n1===n2||n1.includes(n2.split(' ')[0])||n2.includes(n1.split(' ')[0]);
    let local=null, reversed=false;
    for(const m of M){
      // Match on UTC date OR the day before (ESPN may use local date for early-UTC matches)
      const mDate=m.dt.split('T')[0];
      const mDatePrev=new Date(new Date(m.dt).getTime()-86400000).toISOString().split('T')[0];
      if(mDate!==evDate && mDatePrev!==evDate) continue;
      const eh=espnKey(homeName),ea=espnKey(awayName),mh=espnKey(m.h),ma=espnKey(m.a);
      if(nm(eh,mh)&&nm(ea,ma)){local=m;reversed=false;break;}
      if(nm(eh,ma)&&nm(ea,mh)){local=m;reversed=true;break;}
    }
    if(local){
      const hs=home.score!=null?parseInt(home.score):null;
      const as=away.score!=null?parseInt(away.score):null;
      scores[local.id]={
        home: reversed?as:hs,
        away: reversed?hs:as,
        status: ev.status?.type?.name||'',
        minute: ev.status?.displayClock||''
      };
      updated=true;
    }
  });
  return updated;
}

async function fetchScores(){
  const st=document.getElementById('score-status');
  try{
    // Collect unique dates: today + any date with a past or live match
    // Also add the day before for early-UTC matches ESPN may log under the prior local date
    const dateSet=new Set();
    const cutoff=Date.now()-14*24*3600*1000;
    M.forEach(m=>{
      const t=new Date(m.dt).getTime();
      if(t>=cutoff && t<=Date.now()+7200000){
        const ds=m.dt.split('T')[0].replace(/-/g,'');
        dateSet.add(ds);
        // If match starts before 07:00 UTC, ESPN may list it under the previous calendar day
        if(new Date(m.dt).getUTCHours()<7){
          const prev=new Date(t-86400000).toISOString().split('T')[0].replace(/-/g,'');
          dateSet.add(prev);
        }
      }
    });

    const fetches=[...dateSet].map(ds=>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${ds}`,{mode:'cors'})
        .then(r=>r.ok?r.json():null).catch(()=>null)
    );
    const results=await Promise.all(fetches);
    let updated=false;
    results.forEach(data=>{ if(data) updated=parseESPNEvents(data.events||[])||updated; });

    if(updated){
      computeGroupStandings();
      render();
      if(st){st.textContent='вљЅ Scores updated just now';st.className='score-status live';}
    } else if(st){
      st.textContent='';st.className='score-status';
    }
  }catch(e){
    console.warn('ESPN score fetch failed:',e);
    if(st){st.textContent='';st.className='score-status';}
  }
}

// в”Ђв”Ђ Init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
updateNotifBtn();
computeGroupStandings();
render();
updateCountdown();
fetchScores();
setInterval(()=>{updateCountdown();render();},10000);
setInterval(fetchScores,60000);

// Resume immediately when app comes back to foreground (iOS PWA freeze fix)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    updateCountdown();
    render();
    fetchScores();
  }
});
window.addEventListener('pageshow',()=>{
  updateCountdown();
  render();
  fetchScores();
});
</script>
