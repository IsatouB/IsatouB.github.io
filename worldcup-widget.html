  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,#0d1b2a 0%,#1b2838 40%,#0f2233 100%);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 16px}

  .widget{width:100%;max-width:480px;border-radius:24px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06);background:#151f2e}

  /* Header */
  .hd{background:linear-gradient(135deg,#c0392b 0%,#e74c3c 40%,#e8380d 100%);padding:20px 20px 16px;position:relative;overflow:hidden}
  .hd::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
  .hd-inner{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
  .hd-ball{font-size:44px;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
  .hd-text h1{font-size:19px;font-weight:900;color:#fff;letter-spacing:-.3px}
  .hd-text p{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;font-weight:500}
  .hd-actions{display:flex;align-items:center;gap:8px;margin-top:12px;position:relative;z-index:1}
  .badge{background:rgba(255,255,255,.15);backdrop-filter:blur(4px);color:#fff;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.2)}
  .notif-btn{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);transition:background .15s}
  .notif-btn:hover{background:rgba(255,255,255,.25)}
  .notif-btn.on{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}

  /* Countdown */
  .countdown{background:linear-gradient(90deg,rgba(248,165,0,.12),rgba(248,165,0,.06));border-top:1px solid rgba(248,165,0,.2);padding:10px 18px;display:flex;align-items:center;gap:8px;font-size:12px;color:#f9c74f;font-weight:600}
  .countdown .cd-label{flex:1}
  .cd-time{font-variant-numeric:tabular-nums;font-size:13px;font-weight:800;color:#ffd166}

  /* Tabs */
  .tabs{display:flex;background:#1a2636;border-bottom:1px solid rgba(255,255,255,.06);padding:0 4px}
  .tab{flex:1;padding:13px 4px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:rgba(255,255,255,.4);border:none;background:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;letter-spacing:.2px}
  .tab:hover{color:rgba(255,255,255,.7)}
  .tab.active{color:#e8380d;border-bottom-color:#e8380d}

  /* Group pills */
  .group-pills{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;padding:10px 14px;background:#1a2636;border-bottom:1px solid rgba(255,255,255,.05);scrollbar-width:none}
  .group-pills::-webkit-scrollbar{display:none}
  .gpill{flex-shrink:0;padding:5px 13px;font-size:11px;font-weight:700;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);background:transparent;transition:all .15s;white-space:nowrap}
  .gpill:hover{color:#fff;border-color:rgba(255,255,255,.35)}
  .gpill.active{background:#e8380d;color:#fff;border-color:#e8380d}

  /* Match list */
  .mlist{overflow-y:auto;max-height:460px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
  .mlist::-webkit-scrollbar{width:3px}
  .mlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  .day-label{padding:9px 16px 6px;font-size:10px;font-weight:800;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;position:sticky;top:0;background:#151f2e;z-index:2}

  /* Match card */
  .mcard{display:flex;align-items:center;padding:13px 16px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;position:relative}
  .mcard:hover{background:rgba(255,255,255,.03)}
  .mcard.is-today{background:rgba(255,193,7,.04)}
  .mcard.is-live{background:rgba(232,56,13,.06)}
  .mcard.is-live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#e8380d}

  .mc-time{min-width:52px;text-align:center}
  .mc-t{font-size:13px;font-weight:800;color:#fff;line-height:1.2}
  .mc-tz{font-size:10px;color:rgba(255,255,255,.35);font-weight:600}
  .live-pill{background:#e8380d;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.4px;animation:pls 1.2s ease-in-out infinite}
  .mc-min{font-size:10px;color:#ff7c5c;font-weight:700;margin-top:2px}
  @keyframes pls{0%,100%{opacity:1}50%{opacity:.5}}

  .mc-teams{flex:1;min-width:0}
  .mc-row{display:flex;align-items:center;gap:8px;padding:2px 0}
  .mc-flag{font-size:20px;width:26px;text-align:center;line-height:1}
  .mc-name{font-size:13px;font-weight:600;color:#e8edf2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mc-score-val{font-size:15px;font-weight:900;color:#ffd166;min-width:14px;text-align:center;margin-left:auto}
  .mc-vsrow{display:flex;align-items:center;gap:8px;padding:1px 0}
  .mc-vsline{flex:1;height:1px;background:rgba(255,255,255,.06)}
  .mc-vstxt{font-size:9px;color:rgba(255,255,255,.2);font-weight:700;letter-spacing:.5px}
  .mc-score-dash{font-size:11px;color:rgba(255,255,255,.25);font-weight:700;min-width:14px;text-align:center;margin-left:auto}

  .mc-right{min-width:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .mc-stage-chip{font-size:10px;font-weight:700;background:rgba(15,52,96,.6);color:#5d9cec;border:1px solid rgba(93,156,236,.2);border-radius:6px;padding:3px 8px;white-space:nowrap}
  .mc-city{font-size:10px;color:rgba(255,255,255,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
  .chip-r32{background:rgba(46,125,50,.3);color:#81c784;border-color:rgba(129,199,132,.2)}
  .chip-r16{background:rgba(21,101,192,.3);color:#90caf9;border-color:rgba(144,202,249,.2)}
  .chip-qf{background:rgba(106,27,154,.3);color:#ce93d8;border-color:rgba(206,147,216,.2)}
  .chip-sf{background:rgba(230,81,0,.3);color:#ffcc80;border-color:rgba(255,204,128,.2)}
  .chip-fin{background:linear-gradient(135deg,rgba(255,193,7,.3),rgba(232,56,13,.2));color:#ffd54f;border-color:rgba(255,213,79,.3)}
  .chip-3p{background:rgba(69,90,100,.4);color:#b0bec5;border-color:rgba(176,190,197,.2)}


  /* Score fetch status */
  .score-status{font-size:10px;color:rgba(255,255,255,.25);padding:4px 16px;background:#151f2e;text-align:right}
  .score-status.live{color:#81c784}

  /* Footer */

  .dl-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#e8380d,#c0392b);color:#fff;text-decoration:none;padding:10px 16px;border-radius:12px;font-size:12px;font-weight:800;white-space:nowrap;box-shadow:0 4px 14px rgba(232,56,13,.35);transition:transform .15s,box-shadow .15s}

// ── Helpers ───────────────────────────────────────────────────────────────
const ET = 'America/New_York';

function etTime(d){
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:ET});
}
function etDay(d){
  return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',timeZone:ET});
}
function etDateStr(d){
  return d.toLocaleDateString('en-US',{timeZone:ET});
}
function isLive(d){
  const n=Date.now(),s=d.getTime();
  return n>=s && n<=s+7200000;
}
function isTodayET(d){
  return etDateStr(d)===etDateStr(new Date());
}

// ── Live scores state ─────────────────────────────────────────────────────
let scores={};   // keyed by match id: {home, away, status, minute}

// ── Stage chip class ──────────────────────────────────────────────────────
const chipMap={R32:'chip-r32',R16:'chip-r16',QF:'chip-qf',SF:'chip-sf',FIN:'chip-fin','3P':'chip-3p'};
function chipClass(g){return chipMap[g]||''}
function stageLabel(m){return m.stage||`Group ${m.g} · MD${m.md}`}

// ── Match card ────────────────────────────────────────────────────────────
function card(m){
  const d=new Date(m.dt);
  const live=isLive(d);
  const today=isTodayET(d);
  let cls='mcard'+(live?' is-live':today?' is-today':'');
  const sc=scores[m.id];

  let timeHtml;
  if(live){
    const minTxt=sc?.minute ? `<div class="mc-min">${sc.minute}'</div>` : '';
    timeHtml=`<span class="live-pill">LIVE</span>${minTxt}`;
  } else {
    timeHtml=`<div class="mc-t">${etTime(d)}</div><div class="mc-tz">ET</div>`;
  }

  // Score display
  const hScore = sc && sc.home!=null ? `<span class="mc-score-val">${sc.home}</span>` : (live ? `<span class="mc-score-dash">-</span>` : '');
  const aScore = sc && sc.away!=null ? `<span class="mc-score-val">${sc.away}</span>` : (live ? `<span class="mc-score-dash">-</span>` : '');

  const cc=chipClass(m.g);
  return `<div class="${cls}">
    <div class="mc-time">${timeHtml}</div>
    <div class="mc-teams">
      <div class="mc-row"><span class="mc-flag">${m.hf}</span><span class="mc-name">${m.h}</span>${hScore}</div>
      <div class="mc-vsrow"><div class="mc-vsline"></div><span class="mc-vstxt">VS</span><div class="mc-vsline"></div></div>
      <div class="mc-row"><span class="mc-flag">${m.af}</span><span class="mc-name">${m.a}</span>${aScore}</div>
    </div>
    <div class="mc-right">
      <span class="mc-stage-chip ${cc}">${stageLabel(m)}</span>
      <span class="mc-city">${m.city}</span>
    </div>
  </div>`;
}

function groupByDay(arr){
  const out=[]; let cur=null;
  arr.forEach(m=>{
    const key=etDateStr(new Date(m.dt));
    if(!cur||cur.key!==key){cur={key,label:etDay(new Date(m.dt)),items:[]};out.push(cur);}
    cur.items.push(m);
  });
  return out;
}
function renderDays(arr){
  if(!arr.length) return '<div class="empty">No matches found</div>';
  return groupByDay(arr).map(g=>`<div class="day-label">${g.label}</div>`+g.items.map(card).join('')).join('');
}

// ── Tabs ──────────────────────────────────────────────────────────────────
let tab='today', grp='A';

function showTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['today','upcoming','group','knockout'][i]===t);
  });
  render();
}
function setGroup(g){grp=g;render();}

function render(){
  const list=document.getElementById('mlist');
  const pills=document.getElementById('gpills');
  const now=new Date();
  const gs=['A','B','C','D','E','F','G','H','I','J','K','L'];

  if(tab==='today'){
    pills.style.display='none';
    const today=M.filter(m=>isTodayET(new Date(m.dt)));
    if(today.length) list.innerHTML=today.map(card).join('');
    else{
      const next=M.filter(m=>new Date(m.dt)>now).slice(0,8);
      list.innerHTML='<div class="day-label">No matches today — coming up next</div>'+next.map(card).join('');
    }
  } else if(tab==='upcoming'){
    pills.style.display='none';
    list.innerHTML=renderDays(M.filter(m=>new Date(m.dt)>=now&&gs.includes(m.g)));
  } else if(tab==='group'){
    pills.style.display='flex';
    pills.innerHTML=gs.map(g2=>`<button class="gpill${g2===grp?' active':''}" onclick="setGroup('${g2}')">Group ${g2}</button>`).join('');
    list.innerHTML=renderDays(M.filter(m=>m.g===grp));
  } else if(tab==='knockout'){
    pills.style.display='none';
    const stages=[['R32','Round of 32'],['R16','Round of 16'],['QF','Quarterfinals'],['SF','Semifinals'],['3P','3rd Place'],['FIN','Final']];
    list.innerHTML=stages.map(([k,l])=>{const ms=M.filter(m=>m.g===k);return ms.length?`<div class="day-label">${l}</div>`+ms.map(card).join(''):''}).join('');
  }
}

// ── Countdown ─────────────────────────────────────────────────────────────
function updateCountdown(){
  const now=Date.now();
  const live=M.find(m=>isLive(new Date(m.dt)));
  const cdBar=document.getElementById('cd-bar');
  const cdLabel=document.getElementById('cd-label');
  const cdTime=document.getElementById('cd-time');
  if(live){
    const liveGames=M.filter(m=>isLive(new Date(m.dt)));
    cdLabel.textContent=liveGames.length>1?`🔴 ${liveGames.length} matches LIVE now`:`🔴 LIVE — ${live.h} vs ${live.a}`;
    cdTime.textContent='';
    cdBar.style.background='linear-gradient(90deg,rgba(232,56,13,.18),rgba(232,56,13,.07))';
    cdBar.style.borderTopColor='rgba(232,56,13,.35)';
    cdLabel.style.color='#ff7c5c';
    return;
  }
  const next=M.find(m=>new Date(m.dt).getTime()>now);
  if(!next){cdLabel.textContent='Tournament complete 🏆';cdTime.textContent='';return;}

  const diff=new Date(next.dt).getTime()-now;
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),
        mn=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);

  // 15-min reminder notification
  if(diff>0 && diff<=900000 && Notification.permission==='granted'){
    if(!next._notifSent){
      next._notifSent=true;
      new Notification('⚽ Kick-off in 15 mins!',{
        body:`${next.h} vs ${next.a} · ${next.venue}`,tag:`wc-${next.id}`
      });
    }
  }

  cdLabel.textContent=`Next: ${next.h} vs ${next.a}`;
  cdTime.textContent=d>0?`${d}d ${h}h ${mn}m`:(h>0?`${h}h ${mn}m ${s}s`:`${mn}m ${s}s`);
}

// ── Notifications ─────────────────────────────────────────────────────────
const notifSupported = typeof Notification !== 'undefined';

function updateNotifBtn(){
  const btn=document.getElementById('notif-btn');
  if(!notifSupported){btn.textContent='🔔 Reminders';btn.style.opacity='.5';return;}
  const p=Notification.permission;
  if(p==='granted'){btn.textContent='🔔 On';btn.classList.add('on');}
  else if(p==='denied'){btn.textContent='🔕 Blocked';btn.classList.remove('on');}
  else{btn.textContent='🔔 Reminders';btn.classList.remove('on');}
}

async function toggleNotifs(){
  if(!notifSupported){
    alert('Add this page to your Home Screen first, then tap Reminders to enable match notifications.');
    return;
  }
  if(Notification.permission==='granted'){
    alert('Reminders are on! You\'ll get a notification 15 mins before each match.');
    return;
  }
  if(Notification.permission==='denied'){
    alert('Notifications are blocked. Go to Settings → Safari → Notifications to allow them for this site.');
    return;
  }
  const result=await Notification.requestPermission();
  updateNotifBtn();
  if(result==='granted'){
    new Notification('✅ Reminders enabled!',{body:'You\'ll be notified 15 mins before each World Cup match.',tag:'wc-setup'});
  }
}

// ── Live scores (ESPN public API — no key needed) ─────────────────────────
async function fetchScores(){
  const st=document.getElementById('score-status');
  try{
    const res=await fetch(
      'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard',
      {mode:'cors'}
    );
    if(!res.ok) return;
    const data=await res.json();
    const events=data.events||[];
    let updated=false;
    events.forEach(ev=>{
      const comp=ev.competitions?.[0];
      if(!comp) return;
      const home=comp.competitors?.find(c=>c.homeAway==='home');
      const away=comp.competitors?.find(c=>c.homeAway==='away');
      if(!home||!away) return;
      const homeName=home.team?.displayName||'';
      const awayName=away.team?.displayName||'';
      const evDate=ev.date?.split('T')[0];
      const local=M.find(m=>{
        const mDate=m.dt.split('T')[0];
        return mDate===evDate && (
          homeName.toLowerCase().includes(m.h.toLowerCase().split(' ')[0]) ||
          m.h.toLowerCase().includes(homeName.toLowerCase().split(' ')[0])
        );
      });
      if(local){
        const status=ev.status?.type?.name||'';
        const clock=ev.status?.displayClock||'';
        scores[local.id]={
          home: home.score!=null ? parseInt(home.score) : null,
          away: away.score!=null ? parseInt(away.score) : null,
          status,
          minute: clock
        };
        updated=true;
      }
    });
    if(updated){
      render();
      if(st){st.textContent='⚽ Scores updated just now';st.className='score-status live';}
    } else if(st){
      st.textContent='';st.className='score-status';
    }
  }catch(e){
    console.warn('ESPN score fetch failed:',e);
    if(st){st.textContent='';st.className='score-status';}
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
updateNotifBtn();
render();
updateCountdown();
fetchScores();
setInterval(()=>{updateCountdown();render();},10000);
setInterval(fetchScores,60000);

// Resume immediately when app comes back to foreground (iOS PWA freeze fix)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    updateCountdown();
    render();
    fetchScores();
  }
});
window.addEventListener('pageshow',()=>{
  updateCountdown();
  render();
  fetchScores();
});
</script>
